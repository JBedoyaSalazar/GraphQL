type Course {
    _id: ID!
    title: String!
    teacher: String
    description: String!
    topic: String
}

type Query {
    "Returns all courses"
    getCourses: [Course]
    "Returns a single course by ID"
    getCourse(id: ID!): Course
}

type Mutation {
    "Create a new course"
    createCourse(input: CourseInput!): Course
}

input CourseInput {
    title: String!
    teacher: String
    description: String!
    topic: String
}
