"Valida los tipos de nivel"
enum Level {
    BEGINNER
    INTERMEDIATE
    ADVANCED
}

union GlobalSearch = Course | Student | Monitor

type Course {
    _id: ID!
    title: String!
    teacher: String
    description: String!
    topic: String @deprecated(reason: "Use 'subject' instead")
    people: [Person]
    level: Level
}

interface Person {
    _id: ID!
    name: String!
    email: String!
}

type Student implements Person {
    _id: ID!
    name: String!
    email: String!
    avatar: String
}

type Monitor implements Person {
    _id: ID!
    name: String!
    email: String!
    phone: String
}

type Query {
    "Returns all courses"
    getCourses: [Course]
    "Returns a single course by ID"
    getCourse(id: ID!): Course
    "Returns all people"
    getPeople: [Person]
    "Returns a single person by ID"
    getPerson(id: ID!): Person
    "Searches for courses, students, or monitors by a search term"
    searchItems(keyword: String!): [GlobalSearch]
}

type Mutation {
    "Create a new course"
    createCourse(input: CourseInput!): Course
    "Update an existing course"
    updateCourse(id: ID!, input: CourseInputUpdate!): Course
    "Create a new Person"
    createPerson(input: PersonInput!): Person
    "Update an existing Person"
    updatePerson(id: ID!, input: PersonInputUpdate!): Person
    "Adding a Person to a course"
    addPersonToCourse(courseId: ID!, PersonId: ID!): Course
}

input CourseInput {
    title: String!
    teacher: String
    description: String!
    topic: String
    level: Level
}

input CourseInputUpdate {
    title: String
    teacher: String
    description: String
    topic: String
}

input PersonInput {
    name: String!
    email: String!
    phone: String
    avatar: String
}

input PersonInputUpdate {
    name: String
    email: String
    phone: String
    avatar: String
}

